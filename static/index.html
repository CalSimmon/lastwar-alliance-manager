<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survivor Roster - Last War Alliance</title>
    <link rel="stylesheet" href="styles.css">
    <script src="branding.js"></script>
    <script src="toast.js"></script>
    <script src="navigation.js"></script>
</head>
<body data-h1="⚔️ Last War: Survival" data-subtitle="Active survivors. Some loyal, some tolerable, all technically alive.">
    <div class="container">

        <main>
            <!-- Action Bar -->
            <div class="action-bar">
                <button type="button" id="add-member-btn" class="primary-action-btn">
                    <span class="btn-icon">➕</span>
                    <span class="btn-text">Add Member</span>
                </button>
                <button type="button" id="import-csv-trigger-btn" class="secondary-action-btn">
                    <span class="btn-icon">📥</span>
                    <span class="btn-text">Import CSV</span>
                </button>
            </div>

            <!-- CSV Import Section (Initially Hidden) -->
            <section class="csv-import-section" id="csv-import-section" style="display: none;">
                <div class="csv-import-card">
                    <h4>📥 Import from CSV</h4>
                    <p class="csv-help">Upload a CSV file with format: <code>Username,Rank,Power,Level,Status,Last_Active</code> (only Username and Rank will be imported)</p>
                    <div class="csv-upload">
                        <input type="file" id="csv-file" accept=".csv" />
                        <button type="button" id="import-btn" class="import-btn">Preview CSV</button>
                        <button type="button" id="cancel-import-btn" class="secondary-btn">Cancel</button>
                    </div>
                    <div id="import-result" class="import-result" style="display: none;"></div>
                </div>
            </section>

            <!-- Member Modal -->
            <div id="member-modal" class="modal">
                <div class="modal-content modal-member">
                    <span class="close" id="close-member-modal" role="button" tabindex="0" aria-label="Close dialog">&times;</span>
                    <h3 id="modal-form-title">Enlist Survivor</h3>
                    <form id="member-form">
                        <input type="hidden" id="member-id">
                        <div class="form-group">
                            <label for="member-name">Member Name:</label>
                            <input type="text" id="member-name" required placeholder="Enter member name">
                        </div>
                        <div class="form-group">
                            <label for="member-rank">Rank:</label>
                            <select id="member-rank" required>
                                <option value="">Select Rank</option>
                                <option value="R5">R5</option>
                                <option value="R4">R4</option>
                                <option value="R3">R3</option>
                                <option value="R2">R2</option>
                                <option value="R1">R1</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="member-eligible" checked>
                                <span>Eligible for Train</span>
                            </label>
                        </div>
                        <div class="button-group modal-buttons">
                            <button type="submit" id="submit-btn" class="primary-btn">Add Member</button>
                            <button type="button" id="cancel-btn" class="secondary-btn">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- CSV Preview Modal -->
            <div id="csv-preview-modal" class="modal" style="display: none;">
                <div class="modal-content" style="max-width: 800px;">
                    <span class="close" id="close-csv-modal" role="button" tabindex="0" aria-label="Close dialog">&times;</span>
                    <h3>📋 Review CSV Import</h3>
                    <div id="csv-summary" class="csv-summary"></div>
                    <div id="csv-members-preview" class="csv-members-preview"></div>
                    
                    <!-- Members to Remove Section -->
                    <div id="remove-members-section" class="remove-members-section" style="display: none;">
                        <h4>🗑️ Members Not in CSV</h4>
                        <p class="remove-help">Select members to remove from the database:</p>
                        <div id="members-to-remove-list" class="members-to-remove-list"></div>
                    </div>
                    
                    <div class="button-group">
                        <button type="button" id="confirm-csv-btn" class="primary-btn">✔ Confirm & Import Selected</button>
                        <button type="button" id="cancel-csv-btn" class="secondary-btn">✖ Cancel</button>
                    </div>
                </div>
            </div>

            <section class="members-section">
                <h3>Alliance Members</h3>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="🔍 Search by name or rank..." />
                    <button type="button" id="clear-search" class="clear-search" style="display: none;">✕</button>
                </div>
                <div id="members-list" class="members-list">
                    <p class="loading">🔍 Scanning for survivors...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="theme.js"></script>
    <script src="app.js"></script>
</body>
</html>
