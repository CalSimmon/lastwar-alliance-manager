<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marshal Guard - Last War Alliance</title>
    <link rel="stylesheet" href="styles.css">
    <script src="branding.js"></script>
    <script src="toast.js"></script>
    <script src="common.js"></script>
    <script src="navigation.js"></script>
</head>
<body data-h1="🛡️ Last War: Survival" data-subtitle="Alliance Exercise tracking. Because someone has to keep score.">
    <div class="container">

        <main>
            <!-- Tab Buttons -->
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="events">🗓️ Events</button>
                <button class="tab-btn" data-tab="stats">📊 Member Stats</button>
            </div>

            <!-- Events Tab -->
            <div id="tab-events" class="tab-content active">
                <section class="form-section">
                    <div class="mg-toolbar">
                        <h3>🛡️ Marshal Guard Events</h3>
                        <button id="add-event-btn" class="primary-btn officer-only" style="display:none;">➕ Add Event</button>
                    </div>
                    <div id="event-list" class="rk-table-wrapper">
                        <p class="loading">⏳ Loading events...</p>
                    </div>
                </section>
            </div>

            <!-- Member Stats Tab -->
            <div id="tab-stats" class="tab-content">
                <section class="form-section">
                    <div class="mg-toolbar">
                        <h3>📊 Member Statistics</h3>
                        <input type="text" id="stats-search" class="form-control mg-search" placeholder="🔍 Search member...">
                    </div>
                    <div id="stats-list" class="rk-table-wrapper">
                        <p class="loading">⏳ Loading stats...</p>
                    </div>
                </section>
            </div>
        </main>

    </div>

    <!-- Add Event Modal -->
    <div id="event-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" role="button" tabindex="0" aria-label="Close dialog">&times;</span>
            <h3 id="event-modal-title">Add Event</h3>
            <form id="event-form">

                <div class="tab-buttons">
                    <button type="button" class="tab-btn active" data-modal-tab="upload">📷 Screenshot Upload</button>
                    <button type="button" class="tab-btn" data-modal-tab="manual">✍️ Manual Entry</button>
                </div>

                <!-- Upload sub-tab -->
                <div id="modal-tab-upload" class="modal-tab-content active">
                    <input type="file" id="mg-image-input" accept="image/*" multiple style="display:none;">
                    <div id="mg-drop-zone" class="drop-zone">
                        <div id="mg-drop-content">
                            <div class="drop-icon">📁</div>
                            <p class="drop-text">Tap to upload or drag & drop</p>
                            <p class="drop-subtext">MG mail screenshots (up to 10 images)</p>
                        </div>
                        <div id="mg-preview-container" class="preview-container">
                            <div class="preview-header">
                                <p id="mg-files-count"></p>
                                <button type="button" id="mg-clear-btn" class="btn btn-secondary">🗑️ Clear</button>
                            </div>
                            <div id="mg-preview-gallery"></div>
                        </div>
                    </div>
                    <button type="button" id="mg-process-btn" class="btn btn-primary" style="display:none;">🔍 Process Screenshots with OCR</button>
                </div>

                <!-- Manual sub-tab -->
                <div id="modal-tab-manual" class="modal-tab-content">
                    <div class="form-group">
                        <label for="mg-date">Event Date</label>
                        <input type="date" id="mg-date" required>
                    </div>
                    <div class="form-group">
                        <label for="mg-total-damage">Total Alliance Damage</label>
                        <input type="number" id="mg-total-damage" min="0" placeholder="e.g. 58600000">
                    </div>
                    <div class="form-group">
                        <label for="mg-notes">Notes (optional)</label>
                        <textarea id="mg-notes" rows="2" placeholder="Any notes about this event..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">💾 Save Event</button>
                </div>
            </form>
        </div>
    </div>

    <!-- OCR Preview Modal -->
    <div id="ocr-preview-modal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width:700px;">
            <span class="close" role="button" tabindex="0" aria-label="Close dialog">&times;</span>
            <h3>📋 OCR Preview — Review & Confirm</h3>
            <div id="ocr-overwrite-warning" class="info-banner info-banner--warning" style="display:none;">
                <div class="info-content">
                    <div class="info-icon">⚠️</div>
                    <div class="info-text">An event already exists for this date. Confirming will overwrite it.</div>
                </div>
            </div>
            <div class="form-group">
                <label for="ocr-event-date">Event Date</label>
                <input type="date" id="ocr-event-date">
            </div>
            <div class="form-group">
                <label>Total Alliance Damage: <span id="ocr-total-damage"></span></label>
            </div>
            <div id="ocr-participants-table" class="rk-table-wrapper"></div>
            <div class="form-group">
                <label for="ocr-notes">Notes (optional)</label>
                <textarea id="ocr-notes" rows="2"></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" id="ocr-cancel-btn" class="secondary-btn">Cancel</button>
                <button type="button" id="ocr-confirm-btn" class="primary-btn">✔ Confirm & Import</button>
            </div>
        </div>
    </div>

    <!-- Event Detail Modal -->
    <div id="detail-modal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width:700px;">
            <span class="close" role="button" tabindex="0" aria-label="Close dialog">&times;</span>
            <h3 id="detail-modal-title">Event Details</h3>
            <div id="detail-summary"></div>
            <div id="detail-participants" class="rk-table-wrapper"></div>
        </div>
    </div>

    <script src="theme.js"></script>
    <script src="marshal-guard.js"></script>
</body>
</html>
