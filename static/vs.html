<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS Points - Last War Alliance</title>
    <link rel="stylesheet" href="styles.css">
    <script src="branding.js"></script>
    <script src="toast.js"></script>
    <script src="navigation.js"></script>
</head>
<body data-h1="⚔️ Last War: Survival" data-subtitle="VS Points Tracking">
    <div class="container">

        <main>
            <section class="vs-controls">
                <div class="week-selector">
                    <button id="prev-week" class="week-nav-btn">← Previous Week</button>
                    <div class="week-info">
                        <h3 id="week-display">Week of January 7, 2025</h3>
                        <p class="week-subtitle">Monday - Saturday VS Points</p>
                    </div>
                    <button id="next-week" class="week-nav-btn">Next Week →</button>
                </div>
                <div class="action-buttons">
                    <button id="save-btn" class="save-btn">💾 Save Points</button>
                    <button id="clear-btn" class="clear-btn">🗑️ Clear Week</button>
                </div>
            </section>

            <section>
                <input type="text" id="search-box" class="vs-search-box" placeholder="🔍 Search member...">
            </section>

            <section class="table-wrapper">
                <table class="vs-table" id="vs-table">
                    <thead>
                        <tr>
                            <th>Member</th>
                            <th>Monday</th>
                            <th>Tuesday</th>
                            <th>Wednesday</th>
                            <th>Thursday</th>
                            <th>Friday</th>
                            <th>Saturday</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="vs-tbody">
                        <tr>
                            <td colspan="8" style="text-align: center; padding: 20px;">Loading members...</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="theme.js"></script>
    <script src="vs.js"></script>
</body>
</html>
