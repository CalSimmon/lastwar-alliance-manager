<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Awards - Last War Alliance</title>
    <link rel="stylesheet" href="styles.css">
    <script src="branding.js"></script>
    <script src="toast.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 Last War: Survival</h1>
            <h2>Weekly Awards</h2>
            <div class="user-info">
                <div class="user-dropdown">
                    <button id="username-display" class="username-btn"></button>
                    <div id="user-dropdown-menu" class="dropdown-menu">
                        <a href="/profile.html" class="dropdown-item">👤 Profile</a>
                        <a href="/admin.html" class="dropdown-item admin-only" id="admin-dropdown-link" style="display: none;">🔐 Admin Panel</a>
                        <div class="dropdown-divider"></div>
                        <div class="theme-section">
                            <div class="theme-section-label">Theme</div>
                            <a href="#" class="dropdown-item theme-option" data-theme="auto">● Auto (System)</a>
                            <a href="#" class="dropdown-item theme-option" data-theme="light">○ Light</a>
                            <a href="#" class="dropdown-item theme-option" data-theme="dark">○ Dark</a>
                        </div>
                        <div class="dropdown-divider"></div>
                        <a href="#" class="dropdown-item" id="dropdown-logout-btn">🚪 Logout</a>
                    </div>
                </div>
            </div>
        </header>

        <nav class="nav-menu">
            <a href="/" class="nav-link">👥 Members</a>
            <a href="/train.html" class="nav-link">🚂 Train</a>
            <a href="/awards.html" class="nav-link active">🏆 Awards</a>
            <a href="/recommendations.html" class="nav-link">⭐ Recs</a>
            <a href="/dyno.html" class="nav-link">💬 Dyno</a>
            <a href="/rankings.html" class="nav-link">📊 Rankings</a>
            <a href="/storm.html" class="nav-link">🏜️ Storm</a>
            <a href="/vs.html" class="nav-link">⚔️ VS Points</a>
            <a href="/upload.html" class="nav-link">📸 Upload</a>
            <a href="/settings.html" class="nav-link">⚙️ Settings</a>
        </nav>

        <main>
            <section class="awards-controls">
                <div class="week-selector">
                    <button id="prev-week" class="week-nav-btn">← Previous Week</button>
                    <div class="week-info">
                        <h3 id="week-display">Week of January 7, 2025</h3>
                        <p class="week-subtitle">Sunday Awards</p>
                    </div>
                    <button id="next-week" class="week-nav-btn">Next Week →</button>
                </div>
                <div class="awards-actions">
                    <button id="toggle-all-awards-btn" class="secondary-btn">⚙️ Show All Awards</button>
                    <button id="save-awards-btn" class="save-btn">💾 Save Awards</button>
                    <button id="clear-awards-btn" class="clear-btn">🗑️ Clear Week</button>
                </div>
            </section>

            <section class="awards-form-section">
                <div class="add-award-section" style="margin-bottom: 20px; padding: 15px; background: var(--card-bg); border-radius: 10px; border: 2px dashed var(--border-color);">
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="new-award-search" placeholder="🔍 Search or add new award type..." style="flex: 1; padding: 10px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 14px;">
                        <button id="add-award-btn" class="secondary-btn" style="white-space: nowrap;">➕ Add New Award</button>
                    </div>
                    <div id="award-suggestions" style="margin-top: 10px; display: none;"></div>
                </div>
                
                <div id="awards-grid" class="awards-grid">
                    <!-- Awards will be generated here -->
                </div>
            </section>

            <section class="history-section">
                <h3>📊 Awards History</h3>
                <div class="history-filters">
                    <input type="text" id="history-search" placeholder="🔍 Search by member name..." class="history-search">
                    <select id="week-filter" class="week-filter">
                        <option value="">All Weeks</option>
                    </select>
                </div>
                <div id="history-content" class="history-content">
                    <p class="loading">Loading history...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="theme.js"></script>
    <script src="awards.js"></script>
</body>
</html>
