<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruitment - Last War Alliance</title>
    <link rel="stylesheet" href="styles.css">
    <script src="branding.js"></script>
    <script src="toast.js"></script>
    <script src="common.js"></script>
    <script src="navigation.js"></script>
    <script src="theme.js"></script>
</head>
<body data-h1="🎯 Last War: Survival" data-subtitle="Applicant pipeline. Vetting the worthy since we got tired of carrying passengers.">
    <div class="container">

        <main>
            <section class="info-banner" id="requirements-banner" style="display:none;">
                <div class="info-content">
                    <div class="info-icon">📋</div>
                    <div class="info-text" id="requirements-text"></div>
                </div>
            </section>

            <section class="form-section">
                <div class="applicant-header">
                    <h3>🎯 Applicants</h3>
                    <div class="applicant-controls">
                        <select id="status-filter" class="form-control">
                            <option value="all">All statuses</option>
                            <option value="pending" selected>Pending</option>
                            <option value="on_trial">On Trial</option>
                            <option value="approved">Approved</option>
                            <option value="rejected">Rejected</option>
                        </select>
                        <button id="add-applicant-btn" class="primary-btn officer-only" style="display:none;">➕ Add Applicant</button>
                    </div>
                </div>

                <div id="applicant-list">
                    <div class="loading-state">Loading applicants…</div>
                </div>
            </section>
        </main>

    </div>

    <!-- Add/Edit Modal -->
    <div id="applicant-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 id="modal-title">Add Applicant</h3>
            <form id="applicant-form">
                <div class="form-group">
                    <label for="modal-name">Name <span class="required-mark">*</span></label>
                    <input type="text" id="modal-name" required maxlength="100" placeholder="In-game name">
                </div>
                <div class="form-group">
                    <label for="modal-power">Power</label>
                    <input type="number" id="modal-power" min="0" step="1000" placeholder="e.g. 5000000">
                    <span class="help-text" id="modal-power-warn" style="color:var(--accent-danger);display:none;"></span>
                </div>
                <div class="form-group">
                    <label for="modal-rank">Rank</label>
                    <input type="text" id="modal-rank" maxlength="20" placeholder="e.g. R3">
                </div>
                <div class="form-group">
                    <label for="modal-vouched">Vouched by</label>
                    <input type="text" id="modal-vouched" maxlength="100" placeholder="Which officer vouched">
                </div>
                <div class="form-group">
                    <label for="modal-notes">Notes</label>
                    <textarea id="modal-notes" rows="3" placeholder="Context, referrals, concerns…"></textarea>
                </div>
                <div class="form-group">
                    <label for="modal-status">Status</label>
                    <select id="modal-status">
                        <option value="pending">Pending</option>
                        <option value="on_trial">On Trial</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
                <div class="form-group" id="modal-trial-group" style="display:none;">
                    <label for="modal-trial-end">Trial end date</label>
                    <input type="date" id="modal-trial-end">
                </div>
                <div class="form-group officer-only" id="modal-rejection-group" style="display:none;">
                    <label for="modal-rejection">Rejection reason <span class="officer-hint">(officers only)</span></label>
                    <textarea id="modal-rejection" rows="2" placeholder="Private — not visible to regular members"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" id="modal-cancel-btn" class="secondary-btn">Cancel</button>
                    <button type="submit" id="modal-save-btn" class="primary-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Status change modal -->
    <div id="status-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 id="status-modal-title">Change Status</h3>
            <div class="form-group">
                <label for="status-select">New status</label>
                <select id="status-select">
                    <option value="pending">Pending</option>
                    <option value="on_trial">On Trial</option>
                    <option value="approved">Approved</option>
                    <option value="rejected">Rejected</option>
                </select>
            </div>
            <div class="form-group" id="status-trial-group" style="display:none;">
                <label for="status-trial-end">Trial end date</label>
                <input type="date" id="status-trial-end">
            </div>
            <div class="form-group officer-only" id="status-rejection-group" style="display:none;">
                <label for="status-rejection">Rejection reason <span class="officer-hint">(officers only)</span></label>
                <textarea id="status-rejection" rows="2"></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" id="status-cancel-btn" class="secondary-btn">Cancel</button>
                <button type="button" id="status-confirm-btn" class="primary-btn">Apply</button>
            </div>
        </div>
    </div>

    <script src="recruit.js"></script>
</body>
</html>
