<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survivor Rankings - Last War Alliance</title>
    <link rel="stylesheet" href="styles.css">
    <script src="branding.js"></script>
    <script src="toast.js"></script>
    <script src="common.js"></script>
    <script src="navigation.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
</head>
<body data-h1="📊 Last War: Survival" data-subtitle="Who's pulling their weight. Others know who they are.">
    <div class="container">
        <main>

            <!-- ── Up Next ──────────────────────────────── -->
            <section class="rk-up-next-section">
                <div class="rk-up-next-header">
                    <h3 class="rk-up-next-title">🚂 Up Next</h3>
                    <div class="rk-up-next-meta">
                        Avg runs: <strong id="avg-count">—</strong>
                        <span class="rk-meta-sep">·</span>
                        <button class="rk-formula-btn" onclick="openFormulaModal()">⚙️ Scoring Formula</button>
                    </div>
                </div>
                <div id="up-next-list" class="rk-up-next-list">
                    <div class="loading">⚔️ Calculating...</div>
                </div>
            </section>

            <!-- ── Rankings table ──────────────────────── -->
            <section class="rk-section">
                <div class="rk-toolbar">
                    <input type="text" id="filter-name" class="rk-search-input" placeholder="🔍 Search members...">
                    <div class="rk-rank-chips" id="rank-chips">
                        <button class="filter-chip active" data-rank="">All</button>
                        <button class="filter-chip" data-rank="R5">R5</button>
                        <button class="filter-chip" data-rank="R4">R4</button>
                        <button class="filter-chip" data-rank="R3">R3</button>
                        <button class="filter-chip" data-rank="R2">R2</button>
                        <button class="filter-chip" data-rank="R1">R1</button>
                        <button class="filter-chip rk-first-timer-chip" data-rank="first-timer">🆕 First Timers</button>
                    </div>
                    <div class="rk-actions">
                        <select id="sort-by" class="rk-sort-select">
                            <option value="total_score">Score ↓</option>
                            <option value="conductor_count">Runs ↓</option>
                            <option value="days_since">Days Since ↓</option>
                            <option value="award_points">Awards ↓</option>
                            <option value="recommendation_points">Recs ↓</option>
                            <option value="name">Name A–Z</option>
                        </select>
                        <button id="refresh-btn" class="btn btn-sm btn-secondary" title="Refresh rankings">🔄</button>
                        <button id="export-csv-btn" class="btn btn-sm btn-secondary" title="Export CSV">📥 CSV</button>
                    </div>
                </div>

                <div class="rk-table-wrapper">
                    <table class="rk-table">
                        <thead>
                            <tr>
                                <th class="rk-col-pos">#</th>
                                <th class="rk-col-name">Member</th>
                                <th class="rk-col-score">Score</th>
                                <th class="rk-col-runs">Runs</th>
                                <th class="rk-col-since">Last Run</th>
                                <th class="rk-col-awards">Awards</th>
                                <th class="rk-col-recs">Recs</th>
                                <th class="rk-col-mg">MG</th>
                                <th class="rk-col-expand"></th>
                            </tr>
                        </thead>
                        <tbody id="rankings-tbody">
                            <tr><td colspan="9" class="loading">⚔️ Calculating survival scores...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- ── Analytics (collapsible) ─────────────── -->
            <details class="rk-analytics">
                <summary class="rk-analytics-summary">📊 Score Breakdown — Top 10</summary>
                <div class="rk-analytics-body">
                    <canvas id="pointsBreakdownChart" class="rk-analytics-canvas"></canvas>
                </div>
            </details>

        </main>
    </div>

    <!-- Formula Modal -->
    <div id="formula-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeFormulaModal()" role="button" tabindex="0" aria-label="Close">&times;</span>
            <h2>⚙️ Scoring Formula</h2>
            <div id="formula-content"></div>
        </div>
    </div>

    <script src="theme.js"></script>
    <script src="rankings.js"></script>
</body>
</html>
