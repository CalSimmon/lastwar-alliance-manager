services:
  lastwar:
    build:
      context: .
      dockerfile: Dockerfile
    image: lastwar-alliance:latest
    container_name: lastwar-alliance
    ports:
      - "8080:8080"
    volumes:
      # Persist the SQLite database in a local ./data folder
      - ./data:/data
    environment:
      DATABASE_PATH: /data/alliance.db
      # Set SESSION_KEY via .env file or shell environment.
      # Generate one with: openssl rand -hex 32
      SESSION_KEY: "${SESSION_KEY}"
      MG_DEBUG_DIR: "/data/mg-debug"
    restart: unless-stopped
